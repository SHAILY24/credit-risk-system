services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: creditrisk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: creditrisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
      POSTGRES_DB: creditrisk_db
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - creditrisk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditrisk -d creditrisk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: creditrisk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword123}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - creditrisk-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API with UV
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creditrisk-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://creditrisk:${POSTGRES_PASSWORD:-securepassword123}@postgres:5432/creditrisk_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword123}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-secure-secret-key}
      MODEL_PATH: /app/credit_risk_model.pkl
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: http://localhost:3000,http://localhost:80,http://localhost
    volumes:
      - ./backend/credit_risk_model.pkl:/app/credit_risk_model.pkl:ro
      - ./backend/model_info.json:/app/model_info.json:ro
      - backend_logs:/app/logs
    # Backend is reachable internally via the compose network (creditrisk-backend:8000).
    # Host publish intentionally removed to avoid conflicting with another local :8000 service.
    expose:
      - "8000"
    networks:
      - creditrisk-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: creditrisk-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - creditrisk-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main Nginx Router
  nginx:
    image: nginx:alpine
    container_name: crs-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx-initial.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:13185:80"
    networks:
      - creditrisk-network
    depends_on:
      - backend
      - frontend

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: creditrisk-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - creditrisk-network
    profiles:
      - monitoring

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: creditrisk-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - creditrisk-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

networks:
  creditrisk-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local