services:
  nginx:
    image: nginx:alpine
    container_name: crs-nginx
    restart: always
    ports:
      - "13960:80"
    volumes:
      - ./nginx/nginx-initial.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - creditrisk-network
    depends_on:
      - backend
      - frontend

  postgres:
    image: postgres:16-alpine
    container_name: crs-postgres
    restart: always
    environment:
      POSTGRES_USER: creditrisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: creditrisk_db
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - creditrisk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditrisk -d creditrisk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crs-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - creditrisk-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crs-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://creditrisk:${POSTGRES_PASSWORD}@postgres:5432/creditrisk_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      MODEL_PATH: /app/credit_risk_model.pkl
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost,http://crs.shaily.dev,https://crs.shaily.dev
    volumes:
      - ./backend/credit_risk_model.pkl:/app/credit_risk_model.pkl:ro
      - ./backend/model_info.json:/app/model_info.json:ro
      - backend_logs:/app/logs
    networks:
      - creditrisk-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: crs-frontend
    restart: always
    networks:
      - creditrisk-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  creditrisk-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local